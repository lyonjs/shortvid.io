name: 🚧 Integration
on:
  pull_request:
  push:
    branches:
      - "main"

jobs:
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: pnpm/action-setup@v4.0.0
        name: Install pnpm
        with:
          version: 8
      - uses: actions/setup-node@main
        with:
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm run test

  format:
    name: 💅 Check format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: pnpm/action-setup@v4.0.0
        name: Install pnpm
        with:
          version: 8
      - uses: actions/setup-node@main
        with:
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm prettier --check .

  generateVideos:
    needs:
      - test
      - format
    runs-on: ubuntu-latest
    strategy:
      matrix:
        composition:
          - name: "Sponsor"
            props:
              companyName: "Foo"
          - name: "Talk"
            props:
              title: "Example of a Title"
              speakersNames: "John Doe"
          - name: "Meetup"
            props:
              title: "#76 - LyonJS de la rentrée 🦁"
              date: "28 septembre 2022"

    name: 📽 Generating ${{matrix.composition.name}}
    steps:
      - run: sudo apt update
      - run: sudo apt install ffmpeg
      - uses: actions/checkout@main
      - uses: pnpm/action-setup@v4.0.0
        name: Install pnpm
        with:
          version: 8
      - uses: actions/setup-node@main
        with:
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: echo $WORKFLOW_INPUT > input-props.json
        env:
          WORKFLOW_INPUT: ${{ toJson(matrix.event.inputs) }}
      - run: pnpm remotion render remotion/index.tsx ${{matrix.composition.name}} out/${{matrix.composition.name}}.mp4 --props="./input-props.json"
      - uses: actions/upload-artifact@v4
        with:
          name: video-${{matrix.composition.name}}
          path: out
          if-no-files-found: "error"
          compression-level: 0

  nextjs:
    name: ⚛️ NextJS application
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: pnpm/action-setup@v4.0.0
        name: Install pnpm
        with:
          version: 8
      - uses: actions/setup-node@main
        with:
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm build
